version: 2

models:
  - name: test_agent_assignments
    description: "View of the agent_assignments seed table tracking the temporal (effective-dated) assignments of agents to their managers"
    config:
      group: seed_tests
    columns:
      - name: agent_id
        data_type: bigint
        description: "Unique identifier for the agent"
        data_tests:
          - relationships:
                arguments:
                  to: ref('agents')
                  field: agent_id
      - name: manager_id
        data_type: bigint
        description: "Unique identifier for the manager the agent is assigned to during this period"
        data_tests:
          - relationships:
                arguments:
                  to: ref('managers')
                  field: manager_id
      - name: effective_start
        data_type: timestamp with time zone
        description: "Timestamp when this agent-to-manager assignment became active"
      - name: effective_end
        data_type: timestamp with time zone
        description: "Timestamp when this agent-to-manager assignment ended (open-ended assignments use a far-future date)"

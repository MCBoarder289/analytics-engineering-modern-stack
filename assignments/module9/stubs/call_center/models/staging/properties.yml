version: 2

models:
  - name: stg_calls
    description: "Contains all of the telephony call records and measurements for each call"
    columns:
      - name: call_id
        data_tests:
          - unique
          - not_null
        data_type: bigint
        description: "Unique identifier for the call in the telephony system"

      - name: agent_id
        data_type: bigint
        description: "Unique identifier for the agent who handled the call"

      - name: customer_id
        data_type: bigint
        description: "Unique identifier for the customer served on the call"

      - name: queue_hold_time
        data_type: bigint
        description: "Amount of time the caller was on hold before the call was picked up by the agent in seconds"

      - name: start_ts
        data_type: timestamp with time zone
        description: "Timestamp of when the call started"

      - name: end_ts
        data_type: timestamp with time zone
        description: "Timestamp of when the call ended"

      - name: duration_s
        data_type: bigint
        description: "Duration of the entire call in seconds"

      - name: hold_time_during_call_s
        data_type: bigint
        description: "Amount of time the caller was on hold during the call in seconds"

      - name: transfer_flag
        data_type: boolean
        description: "Indicator that the call was escalated to a manager"

      - name: warehouse_updated_ts
        data_type: timestamp with time zone
        description: "Timestamp of when this record was loaded or changed in the data warehouse"

    # TODO: Add model-level data integrity tests using dbt_utils.expression_is_true.
    # Business context:
    #   - Every call record must have an end timestamp that is strictly after its start timestamp.
    #     A call that ends before or at the same time it started is impossible and indicates a
    #     data quality issue in the telephony system.
    #   - Every call must have a positive duration. A zero-second or negative-duration call cannot
    #     represent a real interaction and should be flagged as invalid.
    # Hint: Use the `tests:` block at the model level (not under a column) with
    #   dbt_utils.expression_is_true and an `expression` argument.

  - name: stg_crm
    description: "Contains all of the records from the crm records of each call"
    columns:
      - name: crm_id
        data_type: bigint
        description: "Unique identifier for the crm record in the crm system"
        data_tests:
          - unique
          - not_null

      - name: agent_id
        data_type: bigint
        description: "Unique identifier for the agent who handled the call"

      - name: call_id
        data_type: bigint
        description: "Unique identifier for the call in the telephony system"

      - name: customer_id
        data_type: bigint
        description: "Unique identifier for the customer served"

      - name: reason_code
        data_type: varchar
        description: "High level reason selected by agent representing why the customer called"

      - name: sub_reason_code
        data_type: varchar
        description: "More detailed reason selected by agent on the specific reason for the call"

      - name: previous_issue_flag
        data_type: boolean
        description: "Agent input as to whether this call was about a previous issue"

      - name: created_ts
        data_type: timestamp with time zone
        description: "Timestamp when this crm record was created in the crm system"

      - name: warehouse_updated_ts
        data_type: timestamp with time zone
        description: "Timestamp of when this record was loaded or changed in the data warehouse"

  - name: stg_surveys
    description: "Contains all of the survey responses from customers"
    columns:
      - name: survey_id
        data_tests:
          - unique
          - not_null
        data_type: bigint
        description: "Unique identifier for the survey in the survey system"

      - name: call_id
        data_type: bigint
        description: "Unique identifier for the call in the telephony system"

      - name: agent_id
        data_type: bigint
        description: "Unique identifier for the agent who handled the call"

      - name: customer_id
        data_type: bigint
        description: "Unique identifier for the customer served"

      - name: sent_ts
        data_type: timestamp with time zone
        description: "Timestamp when the survey was sent"

      - name: response_ts
        data_type: timestamp with time zone
        description: "Timestamp when the survey was received"

      - name: csat
        data_type: bigint
        description: "Response to the customer satisfaction question (1 - 5 stars)"
        # TODO: Add an accepted_values test enforcing the valid range for CSAT scores.
        # Business context: Customers rate satisfaction on a 1–5 star scale. Any value
        # outside this range is invalid and indicates a bug in the survey collection tool.

      - name: nps
        data_type: bigint
        description: "Response to the NPS question (On a scale of 1 - 10, how likely are you to recommend this service to a friend?)"
        # TODO: Add an accepted_values test enforcing the valid range for NPS scores.
        # Business context: The NPS survey asks customers to rate likelihood-to-recommend on
        # a 0–10 scale. Any response outside this range is invalid.

      - name: warehouse_updated_ts
        data_type: timestamp with time zone
        description: "Timestamp of when this record was loaded or changed in the data warehouse"
